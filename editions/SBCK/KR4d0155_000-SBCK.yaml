body:
  text: 􅀞梅竹心老乆許爲作􅀞未果以詩督之偶成古調十六韻上呈判府兼贈劉興州再用迹字韻成一首呈判府􅀩示黄磵佳詩三讀欽羡輙継韻仰報嘉賜􅀩示渉汝詩次韻再和游峴山次韻再賦秋月􅀄至邵陽逢入桂林使以書問其地之安危均䑓辭長沙寺桂花重開和若拙弟得倍游後園季髙送酒欲入州不果墨戯和孫升之寺居某竊慕東坡以鐡柱杖爲樂全生日之壽今以大銅缾上判府待制庻幾因物以露區區且作詩二首將之亦東坡故事又用韻春雪次韻邢子友某用家弟韻賦絶句上浼清視蕪詞累句非敢以爲詩也願賜一言卒相之某以雨有嘉應遂占有秋輙採用家弟韻賦二絶句少貲勤䘏之誠也梅􅀩知府寵示秋日郡圃佳製遂侍杖屨逍遥林水間輙次韻四篇上瀆台覧送人歸京師雪賦康平老銅雀硯和顔持約早行海棠􅀉題康平老眄柯亭余識景純家弟出其詩目示喜其同臭味也輙用大成黄字韻賦八句贈之次韻景純道中􅀉大城再􅀩寵示佳什殆無遺巧勉成二章一以報佳貺一以自貽同家弟用前韻謝判府恵酒次韻家弟所賦徙舎􅀩大成賜詩次韻宋主簿詩用大成四桂坊韻賦詩贈令狐昆仲留别􅁑汝州夣賜佳什欽歎不足不揆淺陋輙次元韻某􅀩示詠家弟所撰班史属辝長句三歎之餘輙用元韻以示家弟謹布師席蒙再示属辝三歎之餘讚巨麗無地托言輙依元韻再成一章非獨助家弟稱謝區區少褒之使進學焉亦師席善誘之意也昨日侍巾鉢飯于天寜􅀩佳什謹次韻􅀩再示佳什不敢虚辱厚賜謹再用韻承知府待制誕生之辰輙廣善懷菩薩故事成古詩一首仰惟經世之外深入佛海而某欲託辝以􅀉款款􅃴􅀗此事發寤於心似非偶然者獨恨荒陋不足以侈此殊慶耳游紫邏洞研銘頥軒記跂郭節度父墓誌銘簡齋詩外集目録終
