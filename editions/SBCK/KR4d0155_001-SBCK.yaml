front:
  text: 簡齋詩外集
  hash: sha256:7cc93ec62bf62dbb34a9119ac342e9ce9d91a20f74768b35726465cfb5775099
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0155_SBCK_001-1a}
body:
  text: 􅀞梅積學齋娥眉淡淡自成粧驛使還家空断腸脂粉不施憔悴盡失身未嫁昜元光竹髙枝已約風爲友宻葉能留雪作花昨夜常娥更瀟洒又携踈影過牎紗心老乆許爲作􅀞未果以詩督之布衲王摩詰禪餘􅀉筆端試將能事畢迫肯作􅀞工難秋入無聲句山連欲雨寒平生夣想處奉乞小㠝岏偶成古調十六韻上呈判府兼贈劉興州稽首蘇耽仙乗雲去無跡尚留橘井在與世除狂疾誰能不飲此識味亦可録坐令鄭玄牛亦抱荆山玉偉哉稚川裔神交接朝夕游戯及小道造化入大笔優爲吳詩父雅命楚騷僕豈其橘井助本自同仙籙坐中子列子知是當客日書懸元和脚語經建康力先我登公門不數鷙鳥百曽挹兩仙䄂自然生羽翼嗟我無長才學架屋下屋詩雖兩牛腰事亦幾蛇足已窮猶不悔政荷師友徳文盟儻許予幸不疑藉湜再用迹字韻成一首呈判府風雨一葉過黄花已陳迹人貧交舊踈歳暮日月疾貪人一作冨人積胡椒智不到􅀑録那知􅁃郎萊地瘦飽金玉不如學服氣清座了晨夕尚餘煙月債驅使入吟筆晚逢葛先生憐我出無僕借車得時詣謬窺文字籙談詩不知疲或作夜半客揮毫冩珠玉治郡盖餘力不羡江千萬不慕李八百願傳公句法容我附風翼城東劉子政著書方滿屋昨示一篇詩三百歎未足仍聞供筆硯家有樊通徳但恐裴公門從此近捨湜元忠有侍妾常謂某曰若人有可愛處吾甞記書中事不審使之㝷輙能知其處詩成或使之冩亦往又如人意陳學士願聞斯語􅀩示黄磵佳詩三讀欽羡輙継韻仰報嘉賜癡兒了官事官事那可訖豈知公偷閑臨水照纓紱雖微八川雄􅁀怒常至沸子虚賦說八川云沸乎􅁀怒沸云弗儻或似山隂清流可共祓貪徳實以濟行地不鬱鬱一作地中趙洛與陶丘相比亦彷彿禹貢濟水于陶丘北也解后逢公賞一洗伏流屈可愛不可唾衆議那可咈彼是公餘波本來非俗物􅀩示渉汝詩次韻城南天倒影緑浪揺十里使君雲夣􅅐猶復録此水舟行及雨霽秋色在葭葦煙􅆂翠榖潤月照金波委知公已忘機鷗鷺宛停峙向來趍􅀬士說似顙應泚俗子與清游自古劇凾矢如何有􅀟脚受垢不受洗異哉公殊嗜記此兩苦李詩成墮衡門名字汚紙尾公詩賜某及家弟也明當躡公迹佳處不待指㑹逢白沙渚我舎真可徙鳴騶儻重來傍舫傾我耳再和洪河豈不壯餘潤弥九里海内所詠謌在徳不在水徳人經行地可敬及蒲葦况有水如此浪去劇雪委念昔渉濤江怒鼉如山峙天風怖殺人舟定舷有泚􅅥然三夜夣沙礫下飛矢至今逢溝壑敢照不敢洗忽誦渉汝詩五字擬蘇李快言擊汰事想見魚掉尾十年疑此樂始誤斗柄指便當䇿我足歳月忽轉徙未辦志和舟且洗子荆耳游峴山次韻夜度一程雲平明踏山地山神豈妬我飛雨乱眸子重岳衮兖去前傑後俊偉晦明更百態始望那及此路窮得精廬稅駕諮祖始老僧千金意佳處相指似先生一􅀏領得句昜翻水安石未歸山却要山料理竒哉此一叚驚世無前􅁤酬山以快飲春蕨正滋旨一丘儻許予髙臥飽松髓城中謾拄笏那知有兹事髙人買山隱百萬猶恨少客兒最省事有屐一生了東莊良不遥十里望縹緲縈䊸並麥壠翠浪四山繞先生滯鹿車去程通鳯沼暫來山泉上思與飛雲杳雲北接雲南一逕絶紛擾竹林懷風雨目断極窈窈從來無世塵相對眞不撓龍兒爭地出頭角已表又先生嘱支郎勿使斤斧夭終當乞一杖險路扶吾老轉路山突兀衆山之所望􅂴慵不下山揖山㑹虚堂大空出盤嬉小空時侍傍我游瞻鐡鳯力盡隨木羊石牎非人世意欲淩風翔巉巉䆫中人出定髮有霜過眼幾浮煙關身一禪床教我安心法入鳥不乱行似知使君尊起炷栢子香隴雲亦堪􅀉分作我歸裝好在牎前竹伴師老蒼蒼再賦堂堂李杜壇誰敢躡其址先生坐壇上持􅃏令餘子由來文字伯不但表奏偉髙懷淡無嗜寓興或留此平生上林手避謗淹二始登臨意超然筆落風雨似事異柳司馬辛苦記山水樂哉􅀖無事那待猛政理駕言尉吾民不愧城門􅁤看山􅀏鄒湛句外􅀉深旨巖樹閱幾客尚餘堯時髓宗炳登山詩長松列靖肅下凝堯時髓撫板􅁔公詩未暇知餘事興公賦天台千字一何少峴山逢巧匠籠絡六詩了餘情到娘子心動雲縹緲髣髴山阿人薜荔一身繞殷勤供泚筆路轉得龍沼應龍喜公來嘘氣紛霧杳忽然張蓋起知不受人擾山有龍沼郷人語曰峴山張盖雨霶霈事岀三水小牘霧杳岀文選詩成中有􅀞幽情雜荒窈從公雖一快頋有和詩撓是事姑置之歸路迷日表安得永兹樂彭鏗尚爲夭但愁歸城中念山令人老脩眉入幽夣起費西南望城中望山正在西南終願學柳文買泉築愚堂錯磨髙壁翠日日在我旁忽在新野鄒行從泰山羊城中瞻使君駕鶴髙馳翔詩成墮人世字字含風霜平生仰止勤不但上下牀頋許俗士駕平叅丈人行封姨豈嗔予震怒挾阿香如公終可恃不記當趨裝清歡豈有極夜色來蒼蒼秋月袢暑推不去快風喜來過西榮遲明月與子聊婆娑􅀄如金盆湧稍若玊鑑磨亭亭􅀝華魄艶艶舒凍波夜氣清入骨柰此光景何一盃幸相属安能廢吟哦纎阿無停輪衰􅁂䬃巳多及時㑹行樂無惜醉顔酡􅀄至邵陽逢入桂林使以書問其地之安危湖北弥年所長沙費月餘􅀄爲邵陽夣又作桂州書老矣身安用飄然計本踈管寧遼海上何得便安居均䑓辭小桃借春春巳來平分和氣入均䑓夜來䑓邊草環緑今朝芒生滿三木街頭拍手閙千兒齊唱中和宣布曲使君坐嘯閙如雲請醸百川壽使君但願使君長樂職不湏更看杓虛實東家西家尓盍來聽說空圄如春䑓決曹髙臥印生緑叢􅁄化爲交遜木䇿勲此木那可遺動地風揺枝不曲願我無訟到來雲莫辝着力借㓂君借得賢侯雖尔職但恐朝廷要人調鼎實長沙寺桂花重開天遣幽花兩度開黄昏􅆊放此徘徊不交居士臥禪榻喚出西廂共看來和若拙弟得倍游後園西園冠蓋坐生風更欲長繩繫六龍惟有病夫能省事北䆫三友是過從壯夫三箭功名手儒士百篇藜莧腸莫道人人握珠玉應湏字又挾風霜季髙送酒自接麯生蓬户外便呼伯雅竹牀頭真逢㓜婦着黄絹直遣從事到青州欲入州不果當復入州寛作期人間踏地有安危風流丘壑真吾事籌䇿廟堂非所知白水春陂天淡淡蒼峯晴雪錦離離恰逢居士身輕日正是山中多景時墨戯鄂州遷客一花說仇池老仙五字銘併入晴牎三昧手不湏辛苦讀騷經右蘭人間風露不到畹只有酪奴無世塵何湏更待秋風至蕭艾從來不共春右􅈍和孫升之􅁎國餘芳代有人于今公子秀溪濆處心如水尚書市能賦臨流靜節君花島紅雲春句麗月梅踈影夜香聞囊開古錦湖山出何意一星窺妙文此和升之詠周堅仲十二年前到周子壁間有詩曽見之故有一星窺妙文之句寺居招提逺占一年鳴阻絶干戈得暫經夣境了知非有實醉郷不入自常醒樓䑓近水􅆂明鑑草樹連空冩素屏物􅁚自堪供客眼未湏覓句户長扄某竊慕東坡以鐡柱杖爲樂全生日之壽今以大銅缾上判府待制庶幾因物以露區區且作詩二首將之亦東坡故事要學東坡壽樂全此瓶端合供儒先鐡如意伴無憂畏玉唾壷傍耐歳年項似董宣眞是強腹如邊孝故應便與公剰貯爲霖水不羡宫門承露仙不與觀音伴柳枝要令竒相解公頥㑹逢白氏編書日猶夣陶家貯粟時安用作盤供㰱血也勝爲鉢困催詩千年秀結重重緑長映先生􅁂與眉又用韻春雪急雪催詩興未䦨東風肯柰鳥烏寒最怜度牖勤勤意更接飛花細細看連夜抛回三白瑞及時驚動五辛盤􅀽安乆絶千人望春破還思􅀐一端次韻邢子友壯士如今爛莫収尚思抽矢射旄頭不堪苦霧侵衰􅁂稍喜和煙入戍樓萬里中原空費夣三春勝日偶成遊青松遠嶺偏驚眼薄晚䦨干更少留某用家弟韻賦絶句上浼清視蕪詞累句非敢以爲詩也願賜一言卒相之萬里平生幾蛇足九州何路不羊膓只應緑士蒼官軰却解從公到雪霜某以雨有嘉應遂占有秋輙採用家弟韻賦二絶句少貲勤䘏之誠也雲氣􅀄看龍起湫雨聲旋聽樹驚秋已教農父歌四守更遣虞人信魏侯某比䝉􅀫戒遊冨家池明日微雨猶不廢出故有是句紀徳刋碑不厭豐龍眠深洞一言通坐看緑浪揺千里拔薤栽榆未當功梅愛􅁔纎影上䆫紗無限輕香夜遶家一陣東風濕殘雪強將嬌淚學梨花􅀩知府寵示秋日郡圃佳製遂侍杖屨逍遥林水間輙次韻四篇上瀆台覧歳月移文外乾坤杖屨中鏗然五字律一作句徤在百夫雄秋入池深碧寒欺葉遞紅此間兼吏隱端不减游嵩客有游嵩山者歸以語公又以不得游爲恨鳥語知公樂晴山及我游盡排物外事􅂸作酒中浮菊蘂離􅀟􅁂林聲隱四愁騷人例喜賦政自不關秋竹際笙簧起回聽衆􅄜微時陪物外賞肯念日斜歸草色違秋意池光淨客衣吟公淸絶句政尔不能肥一􅀏聊開口千憂不上眉林深受風得栢老到霜知小憇逢筠洞幽㝷及枳籬願公勤秉燭裁詠􅀥離離送人歸京師門外子規啼未休山村日落夣悠悠故園便是無兵馬猶有歸時一叚愁雪仙手人持白鸞尾夜半朝元明月裏羽衣三振風不断下視銀潢一千里玉􅋴載花分後前欲落未落天恍然餘標從向人間去乞與袁安破曉眠賦康平老銅雀硯鄴城䑓殿已荒凉依舊山河滿夕陽瓦礫却鑱今日硯似教人世冩興亡和顔持約半篙寒碧秋垂釣一􅅇西風夜􅀝樓多少巫山舊家事老來分付水東流早行露侵駝褐曉寒輕星斗䦨干分外明寂寞小橋知夣過稻田深處草虫鳴海棠春雨夜有聲連林杏花落海棠已復動寒食豈寂寞人間有此麗赴我隔年約花葉兩分明春隂耿簾幙東風吹不断日暮煙脂薄何可無我吟三呌恨詩惡􅀉題康平老眄柯亭髙懐志丘壑旣足不願餘惜哉三逕荒滯彼天一隅小築聊自適空園闢榛蕪清影吊髙槐氣與西山俱何以開子顔庭柯作森踈月露洗塵翳天風吹笙竽方其寓目時萬象供嘯呼終然成坐忘天地猶空虚劵外果何有浮雲只湏􅁷乃知鍾鼎豐未勝山林癯淵明死千年日月走名譽不肯見督郵歸來守舊廬可怜骨已朽後有誰継渠願子副名實此事吾欲書余識景純家弟出其詩見示喜其同臭味也輙用大成黄字韻賦八句贈之阿奴喜氣照人黄傳得新詩細作行可愛懸知似楊柳忘憂復不待㯽榔魏収已􅀗崔昻譽摩詰仍推相國長􅂚不少留東閤醉剰収篇詠作歸裝次韻景純道中􅀉大城聞道􅁔行伏李紳古來賢守是詩人乆欽樂廣懷披霧一見周瑜勝飲醇海内期公黄閤老尊前容我白綸巾佳篇咀嚼眞堪飽此日何憂甑有塵再􅀩寵示佳什殆無遺巧勉成二章一以報佳貺一以自貽睆睆休嫌笏與紳如公本是九包人來詩云還山終戴鹿皮巾讀書只用三冬足學道從來一色醇太尉談辭仍玉麈侍中風韻更紗巾誰言上界多官府亦許散仙追後塵諸公衮兖坐垂紳誰信北風欺得人遮眼讀書何用解發顔要酒可湏醇文選醇醴發顔十年白社空看鏡萬里青天一岸巾少待竒章到三日試將冠盖拂埃塵同家弟用前韻謝判府恵酒㗸盃樂聖便稱賢無酒猶堪臥甕間使者在門催僕僕麯車入夢正班班不煩白水真人力來自青城道士山千載王弘仝並羙未應􅂎菊賦寒慳日飲知非貧士冝要逃語穽稅心鞿楚辝心鞿覊而不乱所湏唯酒非虚語以醉爲郷可徑歸鸚鵡鸕鷀俱得道螟蛉蜾臝共忘機狂言戯作麻姑送無柰閽人與我違次韻家弟所賦曹劉方駕信擾爲不廢東郊坐保􅁵投蚓問公逢老手聮珠及我媿連枝定知來者傾三歎共了流年廢幾詩瘀絮車斜敢將去樂天那畏一微之徙舎􅀩大成賜詩南北東西共一塵得坻隨處可収身卜居賦就知謀拙入宅詩成覺意新三徑蓬蒿猶恨淺九流賔客未嫌貧不湏更待髙軒過神有珠璣巳照隣次韻宋主簿詩九折灣中萬斛舟怪公隨處得心休未應菊徑關心急聊爲魚槎盡意留陸子舊蹤餘馬頂羊公遺碣見􅀛頭遥知太白無多事醉裏詩成不待搜用大成四桂坊韻賦詩贈令狐昆仲郷人洗眼看銀黄得桂連枝手尚香盛事固應傳鴈塔新詩不减住鷄坊醍酥乳酪元同味羯末封胡更合堂從此􅁑恢門下客知名可但一􅀭方留别葛汝州平生師友塵莫數兩眼徧明向公許一時盛徳人中驥四海知名地上虎東序堦墀再鞾板西州杖屨三寒暑我方庶兄湯恵休公乃小兒楊徳柤未頒還朝尺一詔不愧專城丈二組爲公剰買銀管筆容我時親玉柄麈近􅀩五字落珠璣杜牧詩云五字落珠璣如服一丸生翅羽别離眞成惜夜燭感歎更值歌朝雨行看入侍玉皇案與進不待金剛杵勸公愼物學孔光薦士何妨似張禹孔光傳云茅子見光居大位幾得其助光終無所薦其公如此張禹傳云禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿夣賜佳什欽歎不足不揆淺陋輙次元韻退之髙文仰東岱籍湜傳盟其足頼固知法嗣要龍􅁚先生端是毗陵􅂀方駕曹劉盖餘力壓倒元白一聊快向來班門収衆材賔履費公珠幾琲三熏㑹有堪此事群犬未免驚所怪但知樓仰百尺顚豈覺波􅆂千頃外南州短簿今公喜巍峩峩冠陸離佩有如若士那可無筆􅀔巳超聲律界相將問道留十日滿座眞成折牀㑹清詩忽復墮華牋要使握瑜誇等軰某䝉示詠家弟所撰班史属辝長句三歎之餘輙用元韻以示家弟謹布師席雋永雜爼雖甚旨何似三冬足文史羡子皮裏西京書議論逼人驚亹亹戯爲語韻網所遺人皆百能子千之雖非張廵徧記誦豈與李翰爭毫􅁵不待區區􅀠古定便令景宗知去病棳要虚煩四十篇三卷之慱能擬聖儒林丈人摛藻春作詩印可融心神我亦從今悔迃學不湏更辨瓉稱臣􅀩再示属辝三歎之餘讃巨麗無地托言輙依元韻再成一章非獨助家弟稱謝區區少褒之使進學焉亦師席善誘之意也書如嘉殽要知旨區又太冲空詠史百年能桂幾牛角火急編摩時亹亹柳家文􅀋今無遺可忍行事空違之此書眞是群玉府事辝所不遺毫􅁵子不見劉勰書成要人定豈但令人愈頭病偶向車前問沈公果符夣裏隨先聖兩詩入手喜生春從今護持知有神便可繕冩持獻御注解不湏煩五臣昨日侍巾鉢飯于天寜􅀩佳什謹次韻朱門未知禪脫義冨不期奢奢自至二韮雖寒故是公萬羊賈禍徒封衛我公居塵不染塵便隨一鉢遺甘辛出家雖非將相事食菜要是英雄人臞儒一生用心苦何曽夣見雞映􅁰中丞惜福幸見分晚食從公當羔羜崔趙公問徑山曰弟子出家得否荅曰出家是大丈夫事非將相所爲出李肇國史􅀘洪州廉使問一禪師曰弟子喫酒肉即是不喫酒肉即是荅曰若喫是中丞禄不喫是中丞福􅀩再示佳什不敢虚辱厚賜謹再用韻先生明經今蔡義念佛仍師大􅀔至大􅀔至王子曰我本因地以念佛心入無生也食菜不待周顒書要断貪殺兼自衛顔回平生拾墮塵蓼虫食蓼忘其辛先生種福我無禍成佛定是同功人兩詩見戒言甚苦肯賦黄鷄啄秋􅁰從今但見􅂴殘芋不敢求嘗鍳虚羜承知府待制誕生之辰輙廣善懷菩薩故事成古詩一首仰惟經世之外深入佛海而某欲託辝以􅀉􅅃􅅃􅃴􅀗此事發寤於心似非偶然者獨依荒陋不足以侈此殊慶耳歳星欲吐芒不開􅄧星避次光低佪麒麟鸑鷟紛夾侍善懷菩薩當重來仙公風流今幾歳再託髙門瑞當世買香趂浴驚衆聾要識此僧今我是金粟後身何足言釋迦親送非虚傳稽首西來大菩薩住世小刼湏千年宰官說法聊應㑹餘事文章亦三昧世間底物堪壽公本自金剛無可壞􅁑仙公起居注云于時在葛尚書家尚書時年八十始有此子時有沙門自稱天竺僧於市大買香市怪問僧曰我昨夜夣善思菩薩生葛尚書家將以香浴之到生時僧至燒香右繞三匝禮拜恭敬沭浴而止靈寶法輪經云􅁑仙公生始數日有外國沙門見仙翁禮拜抱持而告仙公父母曰此是西方善思菩薩今來漢地教化衆生游紫邏洞我不願封萬户侯願向紫邏從公游鄆州溪堂虢州洞未有退之詩可留水近山流清澈底竹飽千霜節如此廊廟之具千金軀底事便着山巖裏蒲鞭掛壁一事無環珮聲中了朝晡祝融不到林深處客至五月懷貂狐徇華大夫無此樂從渠遮山用翠幙若問此間竒絶處但道􅅐中有丘壑研銘無住菴老居士紫玉池娯晚歳不出菴書誦偈誰使之踐朝市入承明司帝制如眢井乆不治百尺泉來莫兾古之人輕百計惟出處不敢易嗟已晚覺非是勒斯銘戒後世頥軒記余客汝州識治獄椽陳徳潤與之語肺肝無溪壑也奔走百僚之底未嘗一日有怠容後官太學而其弟道醇肄業焉官學萬里貧不振天子幸學官之澹然不色喜余以是媿其兄弟道醇間語曰我又有隱居不稼之兄廬西山之下其燕居所榜之曰頥軒前崖岫之􅍶崒後磵壑之琮琤煙雲草木晦明寒暑出天地之竒變以娯軒中之人世之得喪利害無所經其懷我與汝州椽心不能忘也余靣賛之曰鍾皓有兄不仕皓亦逡廵難進居官有聞何􅀧棲遁求志而其子弟遺進退之節後世莫訾焉而今而後知二子之師友不在佗在頥軒尔於其歸也申以告之曰大丈夫用世非難也無媿子頥軒之兄爲難也其亦告子頥軒之兄不仕非難也行義風烈有聞於郷里無愧乎前之山後之磵爲難也古之君子居也其仕也其道一也而已二子方將爲軒冕所縻異日風績振耀而用舎行藏可觀可紀則頥軒之進徳亦可占矣道醇曰是盖頥軒之紀盍書之乃録大略使歸書之其壁且以告徳潤云洛陽陳去非記跂郭節度父墓誌銘自古將帥之世其功名福祚鮮有克全至漢辛武賢父子始傳世爲名將史氏賢之又發於叙傳榮華至今本朝郭氏乃有累世之羙勲業書於竹帛閥閱耀於一時至殿帥益顯遂以􅀫將用也不見其形願察其影其受祉若此則其所行可知矣夫當頌以䂓者同郡之至情也天下方有難非血誠壯烈不足以解國家之憂殿帥勉之亦以告意氣之同者積學齋徐乃昌藏書簡齋詩外集終
