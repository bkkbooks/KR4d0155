front:
  text: 簡齋詩集引詩至老杜極矣東坡蘇公山谷黃公奮乎數世之下復出力振之而詩之正統不墜然東坡賦才也大故解縱繩墨之外而用之不窮山谷措意也深故遊泳味之餘而索之益遠大扺同出老杜而自成一家如李廣程不識之治軍龍伯髙杜季良之行已不可一槩詰也近世詩家知尊杜矣至學蘇者乃指黃為強而附黃者亦謂蘇為肆要必識蘇黃之所不為然後可以涉老杜之涯涘此簡齋陳公之説云耳豫遊吳興得之乃知公所學如此故能獨步一代頃邑士有欲刻公詩者因出前聞為冠集首庶學者知公淵源所自且以折近世黨同伐異之説云公名與義字去非𥘉賦墨梅受知徽考入校中祕書遂掌帝制後參紹興大政簡齋其自謂也玄􅘬敦牂中秋晦齋書簡齋詩外集目録
