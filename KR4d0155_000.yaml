body:
  text: 畫梅竹心老久許為作畫未果以詩督之偶成古調十六韻上呈判府兼贈劉興州再用迹字韻成一首呈判府蒙示黃澗佳詩三讀欽羡輒繼韻仰報嘉賜蒙示涉汝詩次韻再和遊峴山次韻再賦秋月𥘉至邵陽逢入桂林使以書問其地之安危均臺辭長沙寺桂花重開和若拙弟得倍遊後園季髙送酒欲入州不果墨戲和孫升之寺居某竊慕東坡以鐡柱杖為樂全生日之壽今以大銅瓶上判府待制庶幾因物以露區區且作詩二首將之亦東坡故事又用韻春雪次韻邢子友某用家弟韻賦絶句上浼清視蕪詞纍句非敢以為詩也願賜一言卒相之某以雨有嘉應遂占有秋輒採用家弟韻賦二絶句少資勤恤之誠也梅蒙知府寵示秋日郡圃佳製遂侍杖屨逍遙林水間輒次韻四篇上瀆台覽送人歸京師雪賦康平老銅雀硯和顔持約早行海棠寄題康平老眄柯亭余識景純家弟出其詩目示喜其同臭味也輒用大成黃字韻賦八句贈之次韻景純道中寄大城再蒙寵示佳什殆無遺巧勉成二章一以報佳貺一以自貽同家弟用前韻謝判府惠酒次韻家弟所賦徙舍蒙大成賜詩次韻宋主簿詩用大成四桂坊韻賦詩贈令狐昆仲留别葛汝州夢賜佳什欽歎不足不揆淺陋輒次元韻某蒙示詠家弟所撰班史屬辝長句三歎之餘輒用元韻以示家弟謹布師席蒙再示屬辝三歎之餘讚巨麗無地托言輒依元韻再成一章非獨助家弟稱謝區區少褒之使進學焉亦師席善誘之意也昨日侍巾鉢飯于天寧蒙佳什謹次韻蒙再示佳什不敢虛辱厚賜謹再用韻承知府待制誕生之辰輒廣善懷菩薩故事成古詩一首仰惟經世之外深入佛海而某欲託辝以寄款款適獲此事發寤於心似非偶然者獨恨荒陋不足以侈此殊慶耳遊紫邏洞研銘頥軒記跂郭節度父墓志銘簡齋詩外集目録終
